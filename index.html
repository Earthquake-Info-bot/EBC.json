<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>t4.JSON編集フォーム</title>
<style>
  body { font-family: sans-serif; margin: 2rem; }
  table { border-collapse: collapse; width: 100%; margin-bottom: 1rem; font-size: 0.9rem; table-layout: fixed; }
  th, td { border: 1px solid #ccc; padding: 0.3rem 0.5rem; vertical-align: top; overflow: hidden; word-wrap: break-word; }
  th.title, td.title { width: 50%; }
  th.serial, td.serial { width: 25%; }
  th.body, td.body { width: auto; }
  th.action, td.action { width: 80px; text-align: center; }
  input, textarea { width: 100%; box-sizing: border-box; font-size: 0.9rem; }
  button { margin: 0; padding: 0.2rem 0.4rem; font-size: 0.85rem; }
</style>
</head>
<body>

<h1>JSON編集フォーム</h1>

<table id="jsonTable">
  <thead>
    <tr>
      <th class="title">Title</th>
      <th class="serial">Serial</th>
      <th class="body">Body</th>
      <th class="action">操作</th>
    </tr>
  </thead>
  <tbody>
    <!-- 行がここに追加される -->
  </tbody>
</table>

<button id="addRowBtn">行を追加</button>
<button id="copyJsonBtn">JSONコピー</button>

<script>
  // 初期データ
  const data = [
    { "title": "地震", "serial": "1", "body": "さきほど、青森県東方沖を震源とするM7.5、深さ50km、最大震度6強の強い地震がありました。" },
    { "title": "津波", "serial": "2", "body": "現在、津波警報を発表中です。" }
  ];

  const tableBody = document.getElementById('jsonTable').querySelector('tbody');

  // テーブル行を作る関数
  function addRow(item = { title: '', serial: '', body: '' }) {
    const row = document.createElement('tr');

    // Title
    const titleTd = document.createElement('td');
    titleTd.className = 'title';
    const titleInput = document.createElement('input');
    titleInput.value = item.title;
    titleTd.appendChild(titleInput);
    row.appendChild(titleTd);

    // Serial
    const serialTd = document.createElement('td');
    serialTd.className = 'serial';
    const serialInput = document.createElement('input');
    serialInput.value = item.serial;
    serialTd.appendChild(serialInput);
    row.appendChild(serialTd);

    // Body
    const bodyTd = document.createElement('td');
    bodyTd.className = 'body';
    const bodyTextarea = document.createElement('textarea');
    bodyTextarea.rows = 3;
    bodyTextarea.value = item.body;
    bodyTd.appendChild(bodyTextarea);
    row.appendChild(bodyTd);

    // 操作
    const actionTd = document.createElement('td');
    actionTd.className = 'action';
    const deleteBtn = document.createElement('button');
    deleteBtn.textContent = '削除';
    deleteBtn.addEventListener('click', () => {
      tableBody.removeChild(row);
    });
    actionTd.appendChild(deleteBtn);
    row.appendChild(actionTd);

    tableBody.appendChild(row);
  }

  // 初期データを表示
  data.forEach(item => addRow(item));

  // 追加ボタン
  document.getElementById('addRowBtn').addEventListener('click', () => addRow());

  // JSONコピー
  document.getElementById('copyJsonBtn').addEventListener('click', () => {
    const rows = tableBody.querySelectorAll('tr');
    const jsonArray = [];
    rows.forEach(row => {
      const inputs = row.querySelectorAll('input, textarea');
      const obj = {
        title: inputs[0].value.trim(),
        serial: inputs[1].value.trim(),
        body: inputs[2].value.trim()
      };
      if (obj.title || obj.serial || obj.body) {
        jsonArray.push(obj);
      }
    });
    navigator.clipboard.writeText(JSON.stringify(jsonArray, null, 2))
      .then(() => alert('JSONをコピーしました'))
      .catch(err => alert('コピーに失敗しました: ' + err));
  });
</script>

</body>
</html>
